<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>王重鈞的資產配置</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>

    <style> 
        body { background-color: #f8fafc; } 
        .recharts-text { font-family: sans-serif; font-weight: 500; }
        .lock-bg {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ============================================================================
        // ★★★ 設定區 ★★★
        // ============================================================================
        const MY_PASSWORD = "08255299";
        const MY_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRghdwdi-KiihvjPC5dGU_O8FRfzhZLp77JvD_dr1pRHtP_o39CEtFgk71oQwAGzLw5-ZNzB945UCLg/pub?output=csv"; 
        // ============================================================================

        const { useState, useEffect, useMemo } = React;
        const { PieChart, Pie, Cell, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, LabelList } = window.Recharts || {};

        const IconWallet = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-8 h-8 text-blue-600"><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"/><path d="M4 6v12a2 2 0 0 0 2 2h14v-4"/><path d="M18 12a2 2 0 0 0-2 2c0 1.1.9 2 2 2h4v-4h-4z"/></svg>;
        const IconRefresh = ({ spinning }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`w-4 h-4 ${spinning ? 'animate-spin' : ''}`}><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path><path d="M8 16H3v5"></path></svg>;
        const IconTrending = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>;
        const IconPie = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path><path d="M22 12A10 10 0 0 0 12 2v10z"></path></svg>;
        const IconSettings = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.38a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg>;
        const IconClock = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-3 h-3"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
        const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-3 h-3"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
        const IconLink = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>;
        const IconLock = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-12 h-12 text-white"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;

        const STORAGE_KEY = 'wang-assets-dashboard-v9'; // 升級版本號強制洗掉舊暫存
        
        const INITIAL_ASSETS = [
            { id: '692', name: '富邦公司治理', type: 'TW', currency: 'TWD', shares: 48000, price: 73.8 }, 
            { id: 'AAPL', name: '蘋果公司', type: 'US', currency: 'USD', shares: 6, price: 263.40 },
            { id: 'IBIT', name: '比特幣 ETF', type: 'US', currency: 'USD', shares: 670.97211, price: 42.73 },
            { id: 'TSLA', name: '特斯拉', type: 'US', currency: 'USD', shares: 307, price: 388.9 },
            { id: 'SMH', name: '半導體 ETF', type: 'US', currency: 'USD', shares: 278.71878, price: 454.8 },
            { id: 'QQQM', name: '納斯達克 100 ETF', type: 'US', currency: 'USD', shares: 734.71673, price: 263.69 },
            { id: 'CASH', name: '現金資產', type: 'TW', currency: 'TWD', shares: 14559, price: 1 } 
        ];

        const COLORS = ['#0088FE', '#00C49F', '#FFBB28', '#FF8042', '#8884d8', '#ff6b6b', '#20B2AA', '#F43F5E'];

        const AssetDashboard = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [inputPassword, setInputPassword] = useState("");
            const [assets, setAssets] = useState(INITIAL_ASSETS);
            const [exchangeRate, setExchangeRate] = useState(31.5685);
            const [loading, setLoading] = useState(false);
            const [lastUpdated, setLastUpdated] = useState("尚未同步");

            useEffect(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        if (parsed.assets) {
                            const merged = INITIAL_ASSETS.map(init => parsed.assets.find(a => a.id === init.id) || init);
                            setAssets(merged);
                        }
                        if (parsed.exchangeRate) setExchangeRate(parsed.exchangeRate);
                        if (parsed.lastUpdated) setLastUpdated(parsed.lastUpdated);
                    } catch (e) {}
                }
            }, []);

            useEffect(() => {
                if (isLoggedIn) fetchFromSheet();
            }, [isLoggedIn]);

            const fetchFromSheet = async () => {
                setLoading(true);
                try {
                    // ★ 加上時間戳記強迫更新，破除手機瀏覽器快取舊資料的問題 ★
                    let targetUrl = MY_SHEET_URL.includes('/edit') ? MY_SHEET_URL.replace(/\/edit.*$/, '/pub?output=csv') : MY_SHEET_URL;
                    targetUrl += "&t=" + new Date().getTime();
                    
                    const response = await fetch(targetUrl);
                    const text = await response.text();
                    const rows = text.split('\n').map(row => row.split(','));
                    const priceMap = {};
                    
                    rows.forEach(row => {
                        if (row.length >= 3) {
                            // ★ 清除隱藏空白與引號，確保對應精準 ★
                            const id = row[1] ? row[1].replace(/["\r\n\s]/g, '').toUpperCase() : '';
                            const price = row[2] ? parseFloat(row[2].replace(/["\r\n\s,]/g, '')) : NaN;
                            if (id && !isNaN(price)) priceMap[id] = price;
                        }
                    });

                    if (priceMap['USD']) setExchangeRate(priceMap['USD']);
                    
                    setAssets(curr => curr.map(a => {
                        if(a.id === 'CASH') return a; 
                        const newPrice = priceMap[a.id];
                        return newPrice ? { ...a, price: newPrice } : a;
                    }));
                    setLastUpdated(new Date().toLocaleString());
                } catch (e) {
                    console.error("同步失敗", e);
                } finally { 
                    setLoading(false); 
                }
            };

            useEffect(() => {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({ assets, exchangeRate, lastUpdated }));
            }, [assets, exchangeRate, lastUpdated]);

            const calcValueTWD = (a) => a.currency === 'USD' ? (a.shares * a.price * exchangeRate) : (a.shares * a.price);
            const totalValue = useMemo(() => assets.reduce((acc, a) => acc + calcValueTWD(a), 0), [assets, exchangeRate]);

            const barData = useMemo(() => assets.map(a => {
                const val = calcValueTWD(a);
                const percent = totalValue > 0 ? (val / totalValue) * 100 : 0;
                return {
                    name: a.id,
                    台幣價值: Math.round(val),
                    原幣價格: a.price,
                    percentageStr: percent.toFixed(1) + '%' 
                };
            }), [assets, exchangeRate, totalValue]);

            const pieData = useMemo(() => assets.map(a => ({ 
                name: a.id, 
                value: calcValueTWD(a) 
            })).sort((a, b) => b.value - a.value), [assets, exchangeRate]);

            const handleShareChange = (id, v) => setAssets(prev => prev.map(a => a.id === id ? { ...a, shares: Number(v) } : a));
            const handlePriceChange = (id, v) => setAssets(prev => prev.map(a => a.id === id ? { ...a, price: Number(v) } : a));
            
            const handleReset = () => {
                if (confirm('確定重置所有資料？')) {
                    localStorage.removeItem(STORAGE_KEY);
                    window.location.reload();
                }
            };

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen lock-bg flex items-center justify-center p-4">
                        <div className="bg-white/10 backdrop-blur-md border border-white/20 p-8 rounded-2xl shadow-2xl w-full max-w-sm text-center">
                            <div className="bg-white/20 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6"><IconLock /></div>
                            <h2 className="text-2xl font-bold text-white mb-2">王重鈞的資產配置</h2>
                            <form onSubmit={(e) => { e.preventDefault(); if (inputPassword === MY_PASSWORD) setIsLoggedIn(true); }} className="space-y-4">
                                <input type="password" value={inputPassword} onChange={(e) => setInputPassword(e.target.value)} placeholder="輸入密碼" className="w-full px-4 py-3 rounded-xl bg-white/20 border border-white/30 text-white text-center text-lg outline-none focus:ring-2 focus:ring-white/50" autoFocus />
                                <button type="submit" className="w-full bg-white text-blue-600 font-bold py-3 rounded-xl hover:bg-blue-50 transition-colors">解鎖</button>
                            </form>
                        </div>
                    </div>
                );
            }

            if (!window.Recharts) return <div className="p-10 text-center">載入圖表庫中...</div>;

            return (
                <div className="min-h-screen font-sans p-4 md:p-8 max-w-7xl mx-auto space-y-6">
                    <header className="flex flex-col md:flex-row justify-between items-center bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                        <div>
                            <h1 className="text-2xl font-bold flex items-center gap-2 text-slate-800"><IconWallet /> 王重鈞的資產配置</h1>
                            <p className="text-sm text-slate-500 mt-1">最後更新: {lastUpdated}</p>
                        </div>
                        <div className="flex items-center gap-3 mt-4 md:mt-0">
                            <div className="bg-slate-100 px-3 py-2 rounded-lg text-sm font-medium text-slate-700">匯率 (USD/TWD): {exchangeRate.toFixed(4)}</div>
                            <button onClick={fetchFromSheet} className="flex items-center gap-2 px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 shadow-md transition-all active:scale-95">
                                <IconRefresh spinning={loading} /> {loading ? '同步中...' : '同步股價'}
                            </button>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="bg-gradient-to-br from-blue-600 to-indigo-700 text-white p-6 rounded-2xl shadow-lg flex flex-col justify-center">
                            <span className="text-blue-100 text-sm font-medium mb-1">總資產估值 (TWD)</span>
                            <div className="text-4xl font-black">${Math.round(totalValue).toLocaleString()}</div>
                        </div>
                        <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 md:col-span-2 h-64">
                            <ResponsiveContainer width="100%" height="100%">
                                <BarChart data={barData} layout="vertical" margin={{left: 40, right: 60}}>
                                    <CartesianGrid strokeDasharray="3 3" horizontal={false} opacity={0.3} />
                                    <XAxis type="number" hide />
                                    <YAxis dataKey="name" type="category" width={60} tick={{fontSize: 12, fontWeight: 500}} />
                                    <Tooltip cursor={{fill: '#f1f5f9'}} contentStyle={{borderRadius: '8px', border: 'none', boxShadow: '0 4px 12px rgba(0,0,0,0.1)'}} formatter={(value) => `$${value.toLocaleString()}`} />
                                    <Bar dataKey="台幣價值" fill="#3b82f6" radius={[0, 4, 4, 0]} barSize={24}>
                                        <LabelList dataKey="percentageStr" position="right" style={{ fill: '#64748b', fontSize: '12px', fontWeight: 'bold' }} />
                                    </Bar>
                                </BarChart>
                            </ResponsiveContainer>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div className="lg:col-span-2 bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                            <div className="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                                <h3 className="font-bold text-slate-700 flex items-center gap-2"><IconSettings /> 持股明細</h3>
                                <button onClick={handleReset} className="text-xs text-slate-400 hover:text-red-500 flex items-center gap-1 transition-colors"><IconTrash /> 重置</button>
                            </div>
                            <div className="overflow-x-auto">
                                <table className="w-full text-left">
                                    <thead className="text-slate-500 text-xs uppercase bg-slate-50 border-b border-slate-100">
                                        <tr>
                                            <th className="p-4 font-semibold">代號</th>
                                            <th className="p-4 text-right font-semibold">股數 / 金額</th>
                                            <th className="p-4 text-right font-semibold">現價</th>
                                            <th className="p-4 text-right font-semibold">總值 (TWD)</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-50">
                                        {assets.map(a => (
                                            <tr key={a.id} className="hover:bg-blue-50/50 transition-colors">
                                                <td className="p-4">
                                                    <div className="font-bold text-slate-700">{a.id}</div>
                                                    <div className="text-xs text-slate-400">{a.name}</div>
                                                </td>
                                                <td className="p-4 text-right">
                                                    <input type="number" value={a.shares} onChange={(e) => handleShareChange(a.id, e.target.value)} className="w-24 text-right p-2 border border-slate-200 rounded-lg bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all shadow-sm" />
                                                </td>
                                                <td className="p-4 text-right">
                                                    <div className="flex flex-col items-end">
                                                        <input 
                                                            type="number" 
                                                            step="0.01" 
                                                            value={a.price} 
                                                            disabled={a.id === 'CASH'}
                                                            onChange={(e) => handlePriceChange(a.id, e.target.value)} 
                                                            className={`w-24 text-right p-2 border border-slate-200 rounded-lg text-slate-600 outline-none transition-all ${a.id === 'CASH' ? 'bg-slate-100 cursor-not-allowed' : 'bg-slate-50 focus:bg-white focus:ring-2 focus:ring-blue-500'}`} 
                                                        />
                                                    </div>
                                                </td>
                                                <td className="p-4 text-right font-bold text-slate-700">${Math.round(calcValueTWD(a)).toLocaleString()}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 h-[400px]">
                            <h3 className="font-bold text-slate-700 mb-4">資產占比</h3>
                            <ResponsiveContainer width="100%" height="100%">
                                <PieChart>
                                    <Pie data={pieData} cx="50%" cy="50%" innerRadius={60} outerRadius={100} paddingAngle={4} dataKey="value" stroke="none" label={({ percent }) => `${(percent * 100).toFixed(1)}%`}>
                                        {pieData.map((_, i) => <Cell key={i} fill={COLORS[i % COLORS.length]} />)}
                                    </Pie>
                                    <Tooltip formatter={(v) => `$${v.toLocaleString()}`} />
                                    <Legend iconType="circle" verticalAlign="bottom" height={36} />
                                </PieChart>
                            </ResponsiveContainer>
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<AssetDashboard />);
    </script>
</body>
</html>
